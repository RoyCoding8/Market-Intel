name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run backend tests
        run: uv run python -m pytest backend/tests/ -v --tb=short
      - name: Run engine tests
        run: uv run python -m pytest engine/tests/ -v --tb=short

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Run tests
        run: cd frontend && npm test
      - name: Build
        run: cd frontend && npm run build

  integration-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run integration tests
        run: uv run python -m pytest integration/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f Dockerfile.backend -t market-intel-backend .
      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t market-intel-frontend .
      - name: Verify backend starts
        run: |
          docker run -d --name backend-test -p 8000:8000 \
            -e OPENAI_API_KEY=test \
            market-intel-backend
          sleep 5
          python - <<'PY'
          import urllib.request
          urllib.request.urlopen("http://localhost:8000/api/health", timeout=10)
          PY
          docker stop backend-test
